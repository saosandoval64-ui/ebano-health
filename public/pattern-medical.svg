<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <style>
      .line { fill: none; stroke: #A2B676; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; opacity: 0.25; }
      .line-dark { fill: none; stroke: #A2B676; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.18; }
      .dot { fill: #A2B676; opacity: 0.15; }
      .small { fill: none; stroke: #A2B676; stroke-width: 1.2; opacity: 0.15; }
    </style>
  </defs>

  <!-- STETHOSCOPE top-left -->
  <g transform="translate(50, 40)">
    <path class="line" d="M10,0 L10,40 C10,55 25,65 35,55 L35,45" />
    <circle class="line" cx="10" cy="0" r="5" />
    <path class="line" d="M35,45 L35,25" />
    <circle class="line" cx="35" cy="22" r="10" />
  </g>

  <!-- SYRINGE top-center -->
  <g transform="translate(280, 30)">
    <rect class="line" x="0" y="0" width="12" height="60" rx="3" />
    <line class="line" x1="6" y1="-10" x2="6" y2="0" />
    <line class="line" x1="3" y1="60" x2="9" y2="60" />
    <line class="line" x1="0" y1="15" x2="12" y2="15" />
    <line class="line" x1="0" y1="25" x2="12" y2="25" />
    <line class="line" x1="0" y1="35" x2="12" y2="35" />
    <line class="line" x1="4" y1="60" x2="4" y2="70" />
    <line class="line" x1="8" y1="60" x2="8" y2="70" />
  </g>

  <!-- HEART top-right -->
  <g transform="translate(500, 50)">
    <path class="line-dark" d="M0,15 C0,0 15,-5 15,10 C15,-5 30,0 30,15 C30,30 15,45 15,45 C15,45 0,30 0,15Z" />
  </g>

  <!-- VIRUS left -->
  <g transform="translate(80, 200)">
    <circle class="line-dark" cx="25" cy="25" r="18" />
    <circle class="small" cx="25" cy="25" r="6" />
    <!-- spikes -->
    <line class="line" x1="25" y1="7" x2="25" y2="0" />
    <line class="line" x1="25" y1="43" x2="25" y2="50" />
    <line class="line" x1="7" y1="25" x2="0" y2="25" />
    <line class="line" x1="43" y1="25" x2="50" y2="25" />
    <line class="line" x1="12" y1="12" x2="7" y2="7" />
    <line class="line" x1="38" y1="12" x2="43" y2="7" />
    <line class="line" x1="12" y1="38" x2="7" y2="43" />
    <line class="line" x1="38" y1="38" x2="43" y2="43" />
    <!-- spike tips -->
    <circle class="dot" cx="25" cy="0" r="2.5" />
    <circle class="dot" cx="25" cy="50" r="2.5" />
    <circle class="dot" cx="0" cy="25" r="2.5" />
    <circle class="dot" cx="50" cy="25" r="2.5" />
    <circle class="dot" cx="7" cy="7" r="2.5" />
    <circle class="dot" cx="43" cy="7" r="2.5" />
    <circle class="dot" cx="7" cy="43" r="2.5" />
    <circle class="dot" cx="43" cy="43" r="2.5" />
  </g>

  <!-- PILLS center -->
  <g transform="translate(300, 200)">
    <rect class="line" x="0" y="0" width="18" height="30" rx="9" transform="rotate(-20)" />
    <line class="line" x1="-3" y1="15" x2="21" y2="15" transform="rotate(-20)" />
  </g>

  <!-- DNA HELIX right -->
  <g transform="translate(480, 180)">
    <path class="line-dark" d="M0,0 C15,10 15,20 0,30 C-15,40 -15,50 0,60 C15,70 15,80 0,90" />
    <path class="line-dark" d="M20,0 C5,10 5,20 20,30 C35,40 35,50 20,60 C5,70 5,80 20,90" />
    <line class="small" x1="5" y1="10" x2="15" y2="10" />
    <line class="small" x1="0" y1="30" x2="20" y2="30" />
    <line class="small" x1="5" y1="50" x2="15" y2="50" />
    <line class="small" x1="0" y1="70" x2="20" y2="70" />
  </g>

  <!-- PULSE/ECG line center-bottom -->
  <g transform="translate(150, 350)">
    <polyline class="line-dark" points="0,20 40,20 55,20 60,5 65,35 70,10 75,25 80,20 120,20 135,20 140,5 145,35 150,10 155,25 160,20 200,20" />
  </g>

  <!-- BACTERIA bottom-left -->
  <g transform="translate(60, 420)">
    <ellipse class="line" cx="20" cy="15" rx="15" ry="10" />
    <path class="small" d="M5,15 C0,10 -5,15 -10,12" />
    <path class="small" d="M35,15 C40,10 45,15 50,12" />
    <path class="small" d="M15,5 C12,0 18,-3 15,-8" />
    <path class="small" d="M25,5 C28,0 22,-3 25,-8" />
  </g>

  <!-- THERMOMETER bottom-center -->
  <g transform="translate(350, 430)">
    <rect class="line" x="4" y="0" width="8" height="40" rx="4" />
    <circle class="line" cx="8" cy="45" r="8" />
    <circle class="dot" cx="8" cy="45" r="5" />
    <line class="small" x1="8" y1="10" x2="8" y2="38" />
  </g>

  <!-- MICROSCOPE bottom-right -->
  <g transform="translate(500, 400)">
    <line class="line" x1="15" y1="50" x2="15" y2="15" />
    <path class="line" d="M15,15 C15,5 25,0 30,5 L30,20" />
    <line class="line" x1="5" y1="50" x2="25" y2="50" />
    <rect class="small" x="10" y="50" width="10" height="3" rx="1" />
  </g>

  <!-- BAND-AID scattered -->
  <g transform="translate(200, 480)">
    <rect class="line" x="0" y="0" width="40" height="16" rx="8" />
    <line class="small" x1="12" y1="4" x2="12" y2="12" />
    <line class="small" x1="16" y1="4" x2="16" y2="12" />
    <line class="small" x1="20" y1="4" x2="20" y2="12" />
    <line class="small" x1="24" y1="4" x2="24" y2="12" />
    <line class="small" x1="28" y1="4" x2="28" y2="12" />
  </g>

  <!-- MOLECULE -->
  <g transform="translate(420, 300)">
    <circle class="dot" cx="0" cy="0" r="5" />
    <circle class="dot" cx="25" cy="-15" r="4" />
    <circle class="dot" cx="25" cy="15" r="4" />
    <circle class="dot" cx="50" cy="0" r="3.5" />
    <line class="small" x1="4" y1="-2" x2="21" y2="-13" />
    <line class="small" x1="4" y1="2" x2="21" y2="13" />
    <line class="small" x1="29" y1="0" x2="46" y2="0" />
  </g>

  <!-- CAPSULE -->
  <g transform="translate(100, 520)">
    <rect class="line" x="0" y="0" width="35" height="14" rx="7" />
    <line class="line" x1="17" y1="0" x2="17" y2="14" />
  </g>

  <!-- TOOTH scattered -->
  <g transform="translate(520, 520)">
    <path class="small" d="M0,20 C0,5 10,0 15,0 C20,0 30,5 30,20 C30,28 25,35 22,35 C20,35 18,25 15,25 C12,25 10,35 8,35 C5,35 0,28 0,20Z" />
  </g>

</svg>
